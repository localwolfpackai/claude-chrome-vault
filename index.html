<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Chrome Vault</title>
<style>
  :root {
    --brand-primary: #1A73E8;
    --bg: #0f1115;
    --card: #181b22;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --border: #262b35;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
  }
  header {
    padding: 64px 24px 32px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 2.5rem; letter-spacing: -0.02em; }
  header p { color: var(--muted); max-width: 540px; margin: 12px auto 0; }
  main { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }
  h2 {
    margin: 48px 0 16px; font-size: 1.3rem;
    color: var(--brand-primary); letter-spacing: -0.01em;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; transition: border-color .15s;
  }
  .card:hover { border-color: var(--brand-primary); }
  .card h3 { margin: 0 0 6px; font-size: 1.05rem; }
  .card p { margin: 0 0 10px; color: var(--muted); font-size: .9rem; }
  .card a { color: var(--brand-primary); text-decoration: none; font-size: .85rem; }
  .card a:hover { text-decoration: underline; }
  .swatch { height: 56px; border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border); }
  .hex { font-family: monospace; font-size: .8rem; color: var(--muted); }
  .badge {
    display: inline-block; font-size: .7rem; padding: 2px 8px;
    border-radius: 99px; background: #23272f; color: var(--muted); margin-left: 6px;
  }
  footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 32px; }
</style>
</head>
<body>
<header>
  <h1>Claude Chrome Vault</h1>
  <p>A living reference library of design, typography, color, and front-end craft — curated from the web.</p>
</header>
<main id="app">Loading…</main>
<footer id="updated"></footer>

<script>
const SECTIONS = [
  ["Typography", "font"],
  ["Color / Tokens", "color"],
  ["Interaction Patterns", "pattern"],
  ["React / Tooling", "tool"]
];

fetch("data.json")
  .then(r => r.json())
  .then(data => {
    const app = document.getElementById("app");
    app.innerHTML = "";
    SECTIONS.forEach(([title, type]) => {
      const items = data.entries.filter(e => e.type === type);
      if (!items.length) return;
      const h = document.createElement("h2");
      h.textContent = title;
      app.appendChild(h);
      const grid = document.createElement("div");
      grid.className = "grid";
      items.forEach(e => {
        const card = document.createElement("div");
        card.className = "card";
        let inner = "";
        if (type === "color" && e.hex) {
          inner += `<div class="swatch" style="background:${e.hex}"></div>`;
        }
        inner += `<h3>${e.name}${e.license ? `<span class="badge">${e.license}</span>` : ""}</h3>`;
        if (e.hex) inner += `<div class="hex">${e.hex}${e.token ? " · " + e.token : ""}</div>`;
        if (e.notes) inner += `<p>${e.notes}</p>`;
        if (e.source) inner += `<a href="${e.source}" target="_blank" rel="noopener">Source ↗</a>`;
        card.innerHTML = inner;
        grid.appendChild(card);
      });
      app.appendChild(grid);
    });
    document.getElementById("updated").textContent =
      "Last updated: " + (data.lastUpdated || "—");
  })
  .catch(() => {
    document.getElementById("app").textContent = "Could not load data.json";
  });
</script>
</body>
</html>
